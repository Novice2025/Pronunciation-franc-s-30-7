function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderTabs() {
  const container = document.getElementById("tab-container");
  container.innerHTML = phrasesData.map((phrase, index) => `
    <button onclick="selectTab(${index})"
      class="w-full text-left px-4 py-3 rounded-xl border-2 transition-all duration-200
      ${index === activeTab
        ? "bg-blue-50 border-blue-500 text-blue-700"
        : "bg-white border-slate-200 text-slate-700 hover:bg-slate-50 hover:border-slate-300"}">
      <span class="block font-bold text-sm">${phrase.title}</span>
      <span class="block text-xs mt-0.5 ${index === activeTab ? "text-blue-400" : "text-slate-400"}">${phrase.translation}</span>
    </button>
  `).join("");
}

function renderContent() {
  const display = document.getElementById("content-display");
  const phrase = phrasesData[activeTab];
  document.getElementById("prev-btn").disabled = activeTab === 0;
  document.getElementById("next-btn").disabled = activeTab === phrasesData.length - 1;

  if (phrase.isOverview) {
    display.innerHTML = `
      <div class="space-y-6">
        <div>
          <h2 class="text-3xl font-black text-slate-800">🧭 Mapa do Francês Fluido</h2>
          <p class="text-slate-500 mt-1 text-sm">
            Veja como as expressões se conectam: <strong>ligações</strong>, <strong>elisões</strong> e <strong>coup de…</strong>.
          </p>

        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-5">

          <ul class="text-sm text-slate-700 space-y-1">
            <li>• Bloco 13: Respostas e reações (D'accord, Bien sûr, En fait, …)</li>
            <li>• Bloco 14: Quantidades (beaucoup de, trop de, moins de…)</li>
            <li>• Bloco 15: Tempo e frequência (de temps en temps, tous les jours…)</li>
            <li>• Bloco 16: Expressões com « coup de… » (coup de main, coup de foudre…)</li>
          </ul>
        </div>
      </div>
    `;
    return;
  }

  if (phrase.isExerciseTab) {
    display.innerHTML = `
      <div class="space-y-6">
        <div>
          <h2 class="text-3xl font-black text-slate-800">🎯 Exercícios Finais</h2>
          <p class="text-slate-500 mt-1">Traduza as expressões do português para o francês.</p>
        </div>
        <div class="bg-white border-2 border-slate-200 rounded-2xl p-6">
          <div id="ex-progress" class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3"></div>
          <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4">
            <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">🇧🇷 Em Português</p>
            <p id="ex-question" class="text-2xl font-black text-blue-900"></p>
          </div>
          <input id="ex-input" type="text"
            class="w-full p-3 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-500 mb-3 text-slate-800 text-lg"
            placeholder="Escreva em francês..."
            onkeydown="if(event.key==='Enter') checkFinalAnswer()">
          <div class="flex gap-3">
            <button onclick="checkFinalAnswer()" class="flex-1 px-4 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">✅ Verificar</button>
            <button onclick="nextFinalQuestion()" class="flex-1 px-4 py-3 rounded-xl bg-slate-700 text-white font-bold hover:bg-slate-800 transition-colors">➡️ Próxima</button>
          </div>
          <div id="ex-feedback" class="mt-4 p-4 rounded-xl border-2 hidden text-base"></div>
        </div>

  display.innerHTML = `
    <div class="space-y-5">
      <div>

          <p class="font-mono text-xl font-bold text-slate-800">${phrase.writing}</p>

          <p class="font-mono text-xl font-bold text-orange-800">${phrase.native}</p>
        </div>
      </div>
      <div class="bg-green-50 border border-green-200 rounded-2xl p-4">
        <p class="text-xs font-bold text-green-500 uppercase tracking-wider mb-2">🇧🇷 Como o Brasileiro Aprende</p>

      </div>

      <div class="bg-purple-50 border border-purple-200 rounded-2xl p-4">

        <p class="font-semibold text-purple-900 italic">"${phrase.exampleSentence}"</p>
        <p class="text-purple-600 text-sm mt-1">${phrase.exampleTranslation}</p>
      </div>
      <div class="bg-white border-2 border-slate-200 rounded-2xl p-5">
        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">✍️ Exercício Prático</p>
        <div class="bg-slate-50 rounded-xl p-4 mb-4">

      </div>

function selectTab(index) {
  activeTab = index;
  renderTabs();
  renderContent();
  document.getElementById("content-display").scrollTop = 0;
}

function navigate(direction) {
  const newIndex = activeTab + direction;
  if (newIndex >= 0 && newIndex < phrasesData.length) selectTab(newIndex);
}

document.getElementById("prev-btn").onclick = () => navigate(-1);
document.getElementById("next-btn").onclick = () => navigate(1);

function checkAnswer(tabIndex) {
  const input = document.getElementById("exercise-input");
  const feedback = document.getElementById("exercise-feedback");
  if (!input || !feedback) return;

  const userAnswer = input.value.trim().toLowerCase();
  const phrase = phrasesData[tabIndex];
  const correctAnswers = phrase.exerciseCorrectAnswer.map(a => a.toLowerCase().trim());

  feedback.classList.remove("hidden","correct-answer","incorrect-answer");
  input.classList.remove("correct-answer","incorrect-answer");

  if (correctAnswers.includes(userAnswer)) {
    feedback.classList.add("correct-answer");
    input.classList.add("correct-answer");
    feedback.innerHTML = "✅ <span class='font-bold text-green-800'>Correto! Muito bem!</span>";
  } else {
    feedback.classList.add("incorrect-answer");
    input.classList.add("incorrect-answer");
    feedback.innerHTML = `❌ <span class='font-bold text-red-800'>Não exatamente.</span> Resposta esperada: <span class='font-mono font-bold text-red-700'>"${phrase.exerciseCorrectAnswer[0]}"</span>`;
  }
}

function translationData() {
  return phrasesData
    .filter(p => !p.isExerciseTab && !p.isOverview)
    .map(p => ({ portuguese: p.translation, french: p.exerciseCorrectAnswer }));
}

let currentFinalIndex = 0;
let shuffledFinalData = [];

function initFinalExercise() {
  shuffledFinalData = shuffleArray(translationData());
  currentFinalIndex = 0;
  showFinalQuestion();
}

function showFinalQuestion() {
  const qEl = document.getElementById("ex-question");
  const iEl = document.getElementById("ex-input");
  const fEl = document.getElementById("ex-feedback");
  const pEl = document.getElementById("ex-progress");
  if (!qEl || !iEl || !fEl) return;
  const current = shuffledFinalData[currentFinalIndex];
  qEl.textContent = current.portuguese;
  iEl.value = "";
  iEl.classList.remove("correct-answer","incorrect-answer");
  fEl.classList.add("hidden");
  fEl.innerHTML = "";
  iEl.focus();
  if (pEl) pEl.textContent = `Questão ${currentFinalIndex + 1} de ${shuffledFinalData.length}`;
}

function checkFinalAnswer() {
  const iEl = document.getElementById("ex-input");
  const fEl = document.getElementById("ex-feedback");
  if (!iEl || !fEl) return;

  const userAnswer = iEl.value.trim().toLowerCase();
  const current = shuffledFinalData[currentFinalIndex];
  const correctAnswers = current.french.map(a => a.toLowerCase().trim());

  fEl.classList.remove("hidden","correct-answer","incorrect-answer");
  iEl.classList.remove("correct-answer","incorrect-answer");

  if (correctAnswers.includes(userAnswer)) {
    fEl.classList.add("correct-answer");
    iEl.classList.add("correct-answer");
    fEl.innerHTML = "✅ <span class='font-bold text-green-800'>Correto! Excelente!</span>";
  } else {
    fEl.classList.add("incorrect-answer");
    iEl.classList.add("incorrect-answer");
    fEl.innerHTML = `❌ <span class='font-bold text-red-800'>Não exatamente.</span> Resposta esperada: <span class='font-mono font-bold text-red-700'>"${current.french[0]}"</span>`;
  }
}

function nextFinalQuestion() {
  currentFinalIndex = (currentFinalIndex + 1) % shuffledFinalData.length;
  showFinalQuestion();
}

function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

window.onload = () => {
  activeTab = 0;
  renderTabs();
  renderContent();
};
